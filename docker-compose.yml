services:
  postgres:
    container_name: tictac-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    container_name: tictac-nakama
    image: heroiclabs/nakama:3.24.2
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address postgres:localdb@postgres:5432/nakama
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./server/build:/nakama/data/modules
      - ./server/local.yml:/nakama/data/local.yml
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
